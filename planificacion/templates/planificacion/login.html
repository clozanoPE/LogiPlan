<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiPlan - Acceso Daryza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-green { color: #10b981; }
        .bg-brand-green { background-color: #10b981; }
        .bg-brand-dark { background-color: #1f2937; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <!-- Logo e Identidad -->
        <div class="flex flex-col items-center mb-8">
            <div class="flex items-center gap-3 mb-2">
                <!-- Icono del Camión (SVG representativo de LogiPlan) -->
                <div class="bg-brand-green p-2 rounded-lg shadow-lg shadow-green-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                        <path d="M15 18H9"></path>
                        <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a2 2 0 0 0-.59-1.41l-2.82-2.82A2 2 0 0 0 17.18 8H15v10Z"></path>
                        <circle cx="7" cy="18" r="2"></circle>
                        <circle cx="17" cy="18" r="2"></circle>
                    </svg>
                </div>
                <div class="text-left">
                    <h1 class="text-3xl font-extrabold tracking-tight flex items-center">
                        <span class="text-gray-800">LOGI</span>
                        <span class="brand-green italic">PLAN</span>
                    </h1>
                    <p class="text-[10px] font-bold text-gray-400 tracking-[0.2em] uppercase leading-none">Daryza S.A.C.</p>
                </div>
            </div>
            <div class="h-1 w-12 bg-brand-green rounded-full mt-4"></div>
        </div>

        <h2 class="text-center text-gray-500 font-medium mb-8">Gestión de Operaciones - Sede Lurín</h2>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Usuario</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                    <input type="text" name="username" id="username" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-gray-700"
                        placeholder="Ingrese su usuario">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" name="password" id="password" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-gray-700"
                        placeholder="••••••••">
                </div>
            </div>

            {% if form.errors %}
            <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded shadow-sm">
                <p class="text-red-700 text-xs font-medium">Credenciales incorrectas. Verifique e intente de nuevo.</p>
            </div>
            {% endif %}

            <button type="submit" 
                class="w-full bg-brand-green hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all transform hover:-translate-y-0.5 active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Ingresar al Sistema</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
        </form>

        <p class="mt-8 text-center text-[10px] text-gray-400 uppercase tracking-widest font-semibold">
            &copy; 2026 Daryza S.A.C. | Área de Sistemas
        </p>
    </div>
</body>
</html>
